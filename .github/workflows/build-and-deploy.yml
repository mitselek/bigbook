name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Build Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site_jekyll

      - name: Upload Jekyll artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build
          path: ./_site_jekyll
          retention-days: 1

  build-astro:
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npx astro build

      - name: Upload Astro artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-build
          path: ./dist
          retention-days: 1

  assemble:
    runs-on: ubuntu-latest
    needs: [build-jekyll]
    steps:
      - name: Download Jekyll artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-build
          path: ./_pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_pages

  deploy:
    runs-on: ubuntu-latest
    needs: [assemble]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
