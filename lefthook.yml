pre-commit:
  parallel: false
  commands:
    legacy-guard:
      run: bash scripts/legacy-guard.sh {staged_files}
    content-guard:
      run: bash scripts/content-guard.sh {staged_files}
    hard-invariant:
      run: npx tsx scripts/hard-invariant.ts {staged_files}
    typecheck:
      glob: '*.{ts,tsx,astro}'
      run: npx tsc --noEmit
    eslint:
      glob: '*.{ts,tsx,astro}'
      run: npx eslint {staged_files}
    prettier:
      glob: '*.{ts,tsx,astro,md,json,yml,yaml}'
      run: npx prettier --check {staged_files}
