name: Build and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (required for size-limit)
        run: npm run build

      - name: Size check
        run: npm run size

  build-jekyll:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Build Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./legacy
          destination: ./_site_jekyll

      - name: Upload Jekyll artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build
          path: ./_site_jekyll
          retention-days: 1

  build-astro:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npx astro build

      - name: Upload Astro artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-build
          path: ./dist
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only on PR)
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browsers (full matrix on push)
        if: github.event_name != 'pull_request'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build Astro
        run: npm run build

      - name: Run Playwright (chromium only on PR)
        if: github.event_name == 'pull_request'
        run: npm run e2e

      - name: Run Playwright (full matrix on push)
        if: github.event_name != 'pull_request'
        run: npm run e2e:all-browsers

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  assemble:
    runs-on: ubuntu-latest
    needs: [build-jekyll, build-astro, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Astro artifact
        uses: actions/download-artifact@v4
        with:
          name: astro-build
          path: ./_pages

      - name: Download Jekyll artifact
        uses: actions/download-artifact@v4
        with:
          name: jekyll-build
          path: ./_pages/legacy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_pages

  deploy:
    runs-on: ubuntu-latest
    needs: [assemble]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
